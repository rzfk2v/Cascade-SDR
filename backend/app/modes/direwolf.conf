# Minimal receive-only direwolf config for APRS via piped rtl_fm audio (stdin).
#
# direwolf 1.8+ refuses to start without a config file (it prints "Could not open
# configuration file direwolf.conf" and exits), so the APRS mode passes this with
# -c. Audio comes from stdin (the trailing "-" on direwolf's command line); the
# sample rate and 1200-baud modem are also set on the command line.
#
# We only decode — never transmit — so MYCALL is a placeholder. The AGW and KISS
# network listeners are disabled because direwolf defaults them to ports 8000/8001
# and the backend's own server already owns 8000.
ACHANNELS 1
CHANNEL 0
MYCALL N0CALL
MODEM 1200
AGWPORT 0
KISSPORT 0
