<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SDR-Ultra</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand">
          <h1>SDR&#8209;Ultra</h1>
          <div class="conn">
            <span id="dot" class="dot"></span>
            <span id="conn-text">connecting…</span>
          </div>
        </div>

        <nav class="modes" id="mode-tabs">
          <button data-mode="idle" class="active">Idle</button>
          <button data-mode="spectrum">Waterfall</button>
          <button data-mode="scan">Scan</button>
          <button data-mode="radio">Radio</button>
          <button data-mode="adsb" disabled title="coming in M4">ADS&#8209;B</button>
          <button data-mode="ais" disabled title="coming in M5">AIS</button>
        </nav>

        <section class="group">
          <h2>Device</h2>
          <label>Center (MHz)<input id="freq" type="number" step="0.1" value="100.0" /></label>
          <label>Sample rate (MS/s)<input id="rate" type="number" step="0.1" value="2.4" /></label>
          <button id="apply">Tune dongle</button>
          <label class="check"><input id="gain-auto" type="checkbox" checked /> Auto gain</label>
          <label>Gain<input id="gain" type="range" min="0" max="0" step="1" value="0" disabled />
            <span id="gain-val" class="muted">auto</span>
          </label>
          <label>PPM correction<input id="ppm" type="number" step="1" value="0" /></label>
          <p id="status-line" class="status-line"></p>
        </section>

        <section class="group" id="scan-controls" hidden>
          <h2>Scan range</h2>
          <label>From (MHz)<input id="scan-start" type="number" step="0.5" value="88" /></label>
          <label>To (MHz)<input id="scan-stop" type="number" step="0.5" value="108" /></label>
          <button id="scan-apply">Apply range</button>
          <label>Preset
            <select id="scan-preset">
              <option value="">—</option>
              <option value="88,108">FM broadcast 88–108</option>
              <option value="118,137">Airband 118–137</option>
              <option value="144,148">2 m ham 144–148</option>
              <option value="430,440">70 cm ham 430–440</option>
            </select>
          </label>
        </section>

        <section class="group" id="radio-controls" hidden>
          <h2>Radio</h2>
          <label>Demod
            <select id="demod"><option value="fm">FM</option><option value="am">AM</option></select>
          </label>
          <label>Bandwidth (kHz)<input id="bw" type="number" step="5" value="200" /></label>
          <label>Volume<input id="vol" type="range" min="0" max="1.5" step="0.05" value="0.7" /></label>
          <label>Squelch (dB)<input id="sql" type="range" min="-80" max="5" step="1" value="-80" /></label>
          <p id="level-meter" class="level-meter"></p>
          <p id="tuned-line" class="status-line"></p>
        </section>

        <p class="hint">Click a signal to tune it · drag across it to set bandwidth</p>
      </aside>

      <section class="display">
        <button id="zoom-out" class="zoom-out" title="Zoom out (×2)" hidden>⤢ Zoom out</button>
        <div class="wf-wrap">
          <canvas id="scope" class="scope"></canvas>
          <canvas id="waterfall"></canvas>
          <canvas id="overlay" class="overlay"></canvas>
        </div>
        <canvas id="axis" class="axis"></canvas>
      </section>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
