# Nginx location block for Cascade SDR behind /sdr on cascade.engfors.net.
#
# Add this inside your existing server { } block that handles
# cascade.engfors.net (the one with SSL and the weather app at /).
#
# If you don't already have the WebSocket upgrade map in your http { } block
# (e.g. in /etc/nginx/nginx.conf or conf.d/), add it once:
#
#   map $http_upgrade $connection_upgrade {
#       default upgrade;
#       ''      close;
#   }
#
# Then: sudo nginx -t && sudo systemctl reload nginx

location /sdr/ {
    proxy_pass http://127.0.0.1:8000/;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket upgrade (the /sdr/ws path)
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # Spectrum + audio streams are continuous; don't time them out
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
}

# DAB audio: welle-cli runs its own web server on port 7979; the frontend
# streams MP3 from it. Proxy it so external clients don't need direct access.
location /sdr/dab/ {
    proxy_pass http://127.0.0.1:7979/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_buffering off;
}
